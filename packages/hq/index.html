<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Password Gate -->
  <div id="gate" class="gate">
    <div class="gate-inner">
      <span class="gate-label">Mission Control</span>
      <form id="gate-form" autocomplete="off">
        <input type="text" id="gate-input" placeholder="••••••••" autocomplete="off" spellcheck="false" data-lpignore="true" data-1p-ignore style="-webkit-text-security: disc;">
        <div id="gate-error" class="gate-error"></div>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="header-left">
          <button id="back-btn" class="back-btn hidden" aria-label="Back">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="header-text">
            <span class="header-title">Mission Control</span>
            <span class="header-subtitle">30 days to close a $50K-100K MXN client</span>
          </div>
        </div>
        <div class="header-right">
          <div class="tab-switcher" id="tab-switcher">
            <button class="tab-btn active" data-tab="blocks">Blocks</button>
            <button class="tab-btn" data-tab="dashboard">Dashboard</button>
          </div>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ====== BLOCKS TAB (default) ====== -->
    <main id="view-blocks" class="main">

      <!-- Mission Hero -->
      <section id="mission-hero" class="mission-hero"></section>

      <!-- Project List -->
      <section id="project-list" class="project-list"></section>

      <!-- Focus Mode -->
      <section id="focus-mode" class="focus-mode hidden"></section>

    </main>

    <!-- ====== DASHBOARD TAB ====== -->
    <main id="view-dashboard" class="main hidden">

      <!-- Pipeline -->
      <section class="dash-section">
        <h2 class="dash-title">Pipeline</h2>
        <div class="dash-subtitle" id="pipeline-total"></div>
        <div id="pipeline-cards" class="pipeline-scroll"></div>
      </section>

      <!-- Content Cadence -->
      <section class="dash-section">
        <h2 class="dash-title">Content Cadence</h2>
        <div id="cadence-grid" class="cadence-table-wrap"></div>
      </section>

      <!-- Client Hunting -->
      <section class="dash-section">
        <h2 class="dash-title">Client Hunting</h2>
        <div id="platforms" class="platforms-grid"></div>
      </section>

    </main>

    <!-- Numbers Footer -->
    <footer id="numbers-footer" class="numbers-footer">
      <div class="numbers-inner">
        <div class="number-item"><span class="number-label">MRR</span><span class="number-value" id="num-mrr"></span></div>
        <div class="number-item"><span class="number-label">Pipeline</span><span class="number-value" id="num-pipeline"></span></div>
        <div class="number-item"><span class="number-label">Costs</span><span class="number-value" id="num-costs"></span></div>
        <div class="number-item"><span class="number-label">Days Left</span><span class="number-value" id="num-days"></span></div>
      </div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
